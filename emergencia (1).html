<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriverPro - Emergência em Tempo Real</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background: #09090b; color: white; }
        #map { height: 60vh; width: 100%; border-bottom: 1px solid #27272a; }
        #timeout-banner { display: none; background: #ef4444; color: white; padding: 12px; text-align: center; font-weight: bold; font-size: 14px; position: sticky; top: 0; z-index: 1000; }
        .info { padding: 24px; text-align: center; }
        .status { display: inline-block; padding: 4px 12px; background: #ef4444; border-radius: 99px; font-size: 12px; font-weight: bold; margin-bottom: 12px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        h1 { margin: 0; font-size: 24px; font-weight: 900; }
        p { color: #a1a1aa; margin: 8px 0 24px; }
        .samu-btn { display: block; width: 100%; max-width: 300px; margin: 0 auto; padding: 16px; background: #ef4444; color: white; text-decoration: none; border-radius: 16px; font-weight: bold; font-size: 18px; }
        .footer { position: fixed; bottom: 0; width: 100%; padding: 12px; text-align: center; font-size: 10px; color: #52525b; }
    </style>
</head>
<body>
    <div id="timeout-banner">⚠️ Sinal perdido — Esta é a última localização conhecida do motorista</div>
    <div id="map"></div>
    <div class="info">
        <div class="status">EMERGÊNCIA ATIVA</div>
        <h1 id="driver-name">Carregando...</h1>
        <p id="last-update">Última atualização: --:--:--</p>
        <a href="tel:192" class="samu-btn">LIGAR 192 (SAMU)</a>
    </div>
    <div class="footer">DriverPro Safety Network • Localização em tempo real via Satélite</div>

    <script>
        const supabaseJs = window.supabase;
        // Configuração Supabase
        const SUPABASE_URL = 'https://uzmazubryyrlkggztlov.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_CInfJWpkzonRXoRI4ggvdA_vEgg-irD';
        
        // Pegar Token da URL: driverpro.app/emergencia/{token}
        const token = window.location.pathname.split('/').pop();

        const supabaseClient = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            global: {
                headers: { 'x-emergency-token': token }
            }
        });

        let map, marker, lastUpdateTime;

        async function init() {
            // 1. Buscar Perfil pelo Token
            const { data: profile, error: pError } = await supabaseClient
                .from('profiles')
                .select('user_id, nome')
                .eq('link_emergencia_token', token)
                .single();

            if (pError || !profile) {
                alert("Link de emergência inválido ou expirado.");
                return;
            }

            document.getElementById('driver-name').innerText = profile.nome;

            // 2. Buscar Localização Inicial
            const { data: loc, error: lError } = await supabase
                .from('localizacao_tempo_real')
                .select('*')
                .eq('user_id', profile.user_id)
                .single();

            if (lError || !loc.emergencia_ativa) {
                alert("A emergência não está mais ativa.");
                return;
            }

            updateUI(loc);

            // 3. Realtime Subscription
            supabaseClient
                .channel('location-updates')
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'localizacao_tempo_real',
                    filter: `user_id=eq.${profile.user_id}`
                }, payload => {
                    if (!payload.new.emergencia_ativa) {
                        alert("Emergência encerrada.");
                        window.location.reload();
                    }
                    updateUI(payload.new);
                })
                .subscribe();

            // 4. Timeout Check (60s)
            setInterval(() => {
                if (lastUpdateTime && (new Date() - lastUpdateTime > 60000)) {
                    document.getElementById('timeout-banner').style.display = 'block';
                } else {
                    document.getElementById('timeout-banner').style.display = 'none';
                }
            }, 5000);
        }

        function updateUI(loc) {
            const { latitude, longitude, timestamp } = loc;
            lastUpdateTime = new Date(timestamp);
            const time = lastUpdateTime.toLocaleTimeString();
            document.getElementById('last-update').innerText = `Última atualização: ${time}`;

            if (!map) {
                map = L.map('map').setView([latitude, longitude], 17);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                marker = L.marker([latitude, longitude]).addTo(map);
            } else {
                marker.setLatLng([latitude, longitude]);
                map.panTo([latitude, longitude]);
            }
        }

        init();
    </script>
</body>
</html>
