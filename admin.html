<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriverPro Admin - Dashboard Global</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #09090b; color: white; }
        #map { height: 100vh; width: 100%; }
        .pulsing-red {
            animation: pulse-red 2s infinite;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
        }
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .sidebar { background: rgba(18, 18, 21, 0.9); backdrop-filter: blur(10px); border-left: 1px solid #27272a; }
        .stat-card { background: #18181b; border: 1px solid #27272a; padding: 16px; border-radius: 12px; }
    </style>
</head>
<body class="overflow-hidden">
    <div class="flex h-screen">
        <!-- Mapa -->
        <div class="flex-1 relative">
            <div id="map"></div>
            <div id="login-overlay" class="absolute inset-0 z-[2000] bg-black flex items-center justify-center p-4">
                <div class="max-w-md w-full bg-zinc-900 p-8 rounded-2xl border border-zinc-800 text-center">
                    <h1 class="text-3xl font-black mb-2">DriverPro Admin</h1>
                    <p class="text-zinc-400 mb-6 text-sm">Acesso restrito ao administrador central.</p>
                    <button id="login-btn" class="w-full py-4 bg-white text-black font-bold rounded-xl hover:bg-zinc-200 transition-all">Entrar com Google</button>
                    <p id="login-error" class="text-red-500 mt-4 text-xs hidden">Acesso negado. Email não autorizado.</p>
                </div>
            </div>
        </div>

        <!-- Painel Lateral -->
        <div class="w-96 sidebar p-6 overflow-y-auto z-[1000]">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-xl font-black">Dashboard</h2>
                <span id="live-indicator" class="flex items-center gap-2 text-[10px] font-bold text-green-500 uppercase">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Live
                </span>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="stat-card">
                    <p class="text-zinc-500 text-[10px] uppercase font-bold">Emergências</p>
                    <p id="stat-emergencies" class="text-2xl font-black text-red-500">0</p>
                </div>
                <div class="stat-card">
                    <p class="text-zinc-500 text-[10px] uppercase font-bold">Ativos</p>
                    <p id="stat-active" class="text-2xl font-black">0</p>
                </div>
            </div>

            <!-- Planos -->
            <div class="space-y-3 mb-8">
                <h3 class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Usuários por Plano</h3>
                <div class="flex justify-between items-center p-3 bg-zinc-900/50 rounded-lg border border-zinc-800/50">
                    <span class="text-sm">Grátis</span>
                    <span id="plan-gratis" class="font-bold">0</span>
                </div>
                <div class="flex justify-between items-center p-3 bg-zinc-900/50 rounded-lg border border-zinc-800/50">
                    <span class="text-sm text-blue-400">Pro</span>
                    <span id="plan-pro" class="font-bold">0</span>
                </div>
                <div class="flex justify-between items-center p-3 bg-zinc-900/50 rounded-lg border border-zinc-800/50">
                    <span class="text-sm text-amber-400">Elite</span>
                    <span id="plan-elite" class="font-bold">0</span>
                </div>
            </div>

            <!-- Broadcast Geral -->
            <div class="space-y-4 mb-8">
                <h3 class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Broadcast Geral (TTS)</h3>
                <div class="grid grid-cols-1 gap-2">
                    <button onclick="sendBroadcast('Atenção motoristas: alerta de segurança na região.', 'alerta')" class="text-left p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-xs hover:bg-red-500/20 transition-all">
                        🚨 Alerta de Segurança
                    </button>
                    <button onclick="sendBroadcast('Manutenção programada. O app voltará em breve.', 'manutencao')" class="text-left p-3 bg-zinc-800 border border-zinc-700 rounded-xl text-xs hover:bg-zinc-700 transition-all">
                        ⚠️ Manutenção Programada
                    </button>
                    <button onclick="sendBroadcast('Atualização disponível. Reinicie o DriverPro.', 'atualizacao')" class="text-left p-3 bg-green-500/10 border border-green-500/20 rounded-xl text-xs hover:bg-green-500/20 transition-all">
                        ✅ Atualização Disponível
                    </button>
                </div>
                <div class="space-y-2">
                    <textarea id="custom-broadcast" placeholder="Mensagem personalizada..." class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-xs text-white focus:outline-none focus:border-zinc-600 h-20"></textarea>
                    <button id="send-custom-btn" class="w-full py-3 bg-white text-black font-bold rounded-xl text-xs hover:bg-zinc-200 transition-all">Enviar Mensagem Livre</button>
                </div>
            </div>

            <!-- Cidades / Mesh Toggle -->
            <div class="space-y-4">
                <h3 class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Cidades Ativas (Mesh)</h3>
                <div id="city-list" class="space-y-2">
                    <!-- Gerado via JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://YOUR_PROJECT_URL.supabase.co';
        const SUPABASE_KEY = 'YOUR_ANON_KEY';
        const ADMIN_EMAIL = 'reisrivaldo9@gmail.com';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let map, markers = {};

        // 1. Autenticação
        async function checkAuth() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user && user.email === ADMIN_EMAIL) {
                document.getElementById('login-overlay').classList.add('hidden');
                initDashboard();
            }
        }

        document.getElementById('login-btn').onclick = async () => {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.href }
            });
        };

        // 2. Inicialização
        async function initDashboard() {
            map = L.map('map', { zoomControl: false }).setView([-15.7801, -47.9292], 4);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            loadInitialData();
            setupRealtime();
        }

        async function loadInitialData() {
            // Buscar Localizações
            const { data: locations } = await supabase.from('localizacao_tempo_real').select('*, profiles(nome, plano)');
            locations?.forEach(updateMarker);

            // Buscar Stats de Planos
            const { data: profiles } = await supabase.from('profiles').select('plano');
            const counts = profiles.reduce((acc, p) => {
                acc[p.plano] = (acc[p.plano] || 0) + 1;
                return acc;
            }, {});
            document.getElementById('plan-gratis').innerText = counts.gratis || 0;
            document.getElementById('plan-pro').innerText = counts.pro || 0;
            document.getElementById('plan-elite').innerText = counts.elite || 0;

            // Buscar Cidades / Feature Flags
            const { data: flags } = await supabase.from('feature_flags').select('*');
            renderCityList(flags);
        }

        function setupRealtime() {
            supabase.channel('admin-global')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'localizacao_tempo_real' }, payload => {
                    updateMarker(payload.new);
                    updateStats();
                })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'emergencias' }, payload => {
                    notifyEmergency(payload.new);
                })
                .subscribe();
        }

        function updateMarker(loc) {
            if (!loc.latitude || !loc.longitude) return;

            const iconColor = loc.emergencia_ativa ? 'red' : (loc.frequencia_gps === 5 ? 'yellow' : 'green');
            const isEmergency = loc.emergencia_ativa;

            if (markers[loc.user_id]) {
                markers[loc.user_id].setLatLng([loc.latitude, loc.longitude]);
                // Update icon if status changed
            } else {
                const marker = L.circleMarker([loc.latitude, loc.longitude], {
                    radius: 8,
                    fillColor: iconColor,
                    color: "#fff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8,
                    className: isEmergency ? 'pulsing-red' : ''
                }).addTo(map);
                markers[loc.user_id] = marker;
            }
        }

        function renderCityList(flags) {
            const list = document.getElementById('city-list');
            list.innerHTML = flags.map(f => `
                <div class="flex items-center justify-between p-3 bg-zinc-900 rounded-xl border border-zinc-800">
                    <div>
                        <p class="text-sm font-bold">${f.cidade}</p>
                        <p class="text-[10px] text-zinc-500 uppercase">${f.estado} • ${f.total_usuarios_atual} users</p>
                    </div>
                    <button onclick="toggleMesh('${f.id}', ${f.mesh_ativo})" class="w-10 h-5 rounded-full relative transition-all ${f.mesh_ativo ? 'bg-green-500' : 'bg-zinc-700'}">
                        <div class="absolute top-1 w-3 h-3 bg-white rounded-full transition-all ${f.mesh_ativo ? 'right-1' : 'left-1'}"></div>
                    </button>
                </div>
            `).join('');
        }

        async function toggleMesh(id, current) {
            await supabase.from('feature_flags').update({ mesh_ativo: !current }).eq('id', id);
            loadInitialData(); // Refresh
        }

        async function sendBroadcast(mensagem, tipo) {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return;

            const activeCount = Object.keys(markers).length;

            const { error } = await supabase.from('broadcasts').insert({
                mensagem,
                tipo,
                enviado_por: user.id,
                total_recebido: activeCount
            });

            if (error) {
                alert("Erro ao enviar broadcast: " + error.message);
            } else {
                alert("Broadcast enviado com sucesso para " + activeCount + " motoristas!");
            }
        }

        document.getElementById('send-custom-btn').onclick = () => {
            const msg = document.getElementById('custom-broadcast').value;
            if (msg.trim()) {
                sendBroadcast(msg, 'custom');
                document.getElementById('custom-broadcast').value = '';
            }
        };

        function notifyEmergency(emergency) {
            if (Notification.permission === "granted") {
                new Notification("🚨 EMERGÊNCIA DRIVERPRO", {
                    body: `Novo alerta de ${emergency.tipo} detectado!`,
                    icon: "/icon.png"
                });
            }
            // Som de alerta
            const audio = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-alarm-digital-clock-beep-989.mp3');
            audio.play();
        }

        function updateStats() {
            const activeEmergencies = Object.values(markers).filter(m => m.options.fillColor === 'red').length;
            document.getElementById('stat-emergencies').innerText = activeEmergencies;
            document.getElementById('stat-active').innerText = Object.keys(markers).length;
        }

        // Pedir permissão de notificação
        if (Notification.permission !== "denied") {
            Notification.requestPermission();
        }

        checkAuth();
    </script>
</body>
</html>
